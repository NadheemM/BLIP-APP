name: blip
description: "Blip - A real-time chat application"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.9
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
